name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image metadata
        run: |
          echo "Built Docker image successfully"
          docker images --filter "reference=ghcr.io/${{ github.repository }}" --format "{{.Tag}}"

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Test theme files exist
        run: |
          echo "Checking theme files..."
          ls -la src/less/themes/*.less | wc -l
          
      - name: Check Dockerfile
        run: |
          echo "Checking Dockerfile..."
          docker run --rm -v $PWD:/workspace ghcr.io/${{ github.repository }}:latest --version || true

  deploy-railway:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://priv.au
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: railway/action-deploy@latest
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
