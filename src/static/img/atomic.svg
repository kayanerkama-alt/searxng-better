<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for nucleus -->
    <radialGradient id="nucleusGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ee5a24"/>
      <stop offset="100%" style="stop-color:#d63031"/>
    </radialGradient>
    
    <!-- Gradient for orbits -->
    <linearGradient id="orbitGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    
    <linearGradient id="orbitGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    
    <linearGradient id="orbitGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9ca24"/>
      <stop offset="100%" style="stop-color:#f0932b"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="256" cy="256" r="200" fill="url(#orbitGradient1)" opacity="0.1">
    <animate attributeName="r" values="180;220;180" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Outer orbit (tilted ellipse 1) -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#orbitGradient1)" stroke-width="3" opacity="0.6" transform="rotate(-30 256 256)">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Electron 1 on outer orbit -->
  <g transform="rotate(-30 256 256)">
    <circle r="12" fill="#667eea" filter="url(#glow)">
      <animateMotion dur="10s" repeatCount="indefinite">
        <mpath href="#orbitPath1"/>
      </animateMotion>
    </circle>
    <circle r="12" fill="white" opacity="0.5">
      <animateMotion dur="10s" repeatCount="indefinite">
        <mpath href="#orbitPath1"/>
      </animateMotion>
    </circle>
  </g>
  
  <path id="orbitPath1" d="M76,256 a180,180 0 1,1 360,0 a180,60 0 1,1 -360,0" fill="none"/>
  
  <!-- Middle orbit (tilted ellipse 2) -->
  <ellipse cx="256" cy="256" rx="160" ry="80" fill="none" stroke="url(#orbitGradient2)" stroke-width="3" opacity="0.6" transform="rotate(45 256 256)">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="-360 256 256" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Electron 2 on middle orbit -->
  <g transform="rotate(45 256 256)">
    <circle r="10" fill="#38ef7d" filter="url(#glow)">
      <animateMotion dur="8s" repeatCount="indefinite" direction="reverse">
        <mpath href="#orbitPath2"/>
      </animateMotion>
    </circle>
    <circle r="10" fill="white" opacity="0.5">
      <animateMotion dur="8s" repeatCount="indefinite" direction="reverse">
        <mpath href="#orbitPath2"/>
      </animateMotion>
    </circle>
  </g>
  
  <path id="orbitPath2" d="M96,256 a160,160 0 1,1 320,0 a160,80 0 1,1 -320,0" fill="none"/>
  
  <!-- Inner orbit (tilted ellipse 3) -->
  <ellipse cx="256" cy="256" rx="120" ry="50" fill="none" stroke="url(#orbitGradient3)" stroke-width="3" opacity="0.8" transform="rotate(-60 256 256)">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Electron 3 on inner orbit -->
  <g transform="rotate(-60 256 256)">
    <circle r="8" fill="#f9ca24" filter="url(#glow)">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbitPath3"/>
      </animateMotion>
    </circle>
  </g>
  
  <path id="orbitPath3" d="M136,256 a120,120 0 1,1 240,0 a120,50 0 1,1 -240,0" fill="none"/>
  
  <!-- Nucleus (pulsing atom) -->
  <g filter="url(#shadow)">
    <!-- Main nucleus sphere -->
    <circle cx="256" cy="256" r="45" fill="url(#nucleusGradient)">
      <animate attributeName="r" values="42;48;42" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Nucleus highlight -->
    <circle cx="240" cy="240" r="15" fill="white" opacity="0.4">
      <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Inner glow -->
    <circle cx="256" cy="256" r="30" fill="white" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Protons cluster -->
    <circle cx="250" cy="250" r="8" fill="#ff4757">
      <animate attributeName="cy" values="250;262;250" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="268" cy="258" r="6" fill="#ff6348">
      <animate attributeName="cx" values="268;256;268" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="258" cy="270" r="7" fill="#ff7f50">
      <animate attributeName="cy" values="270;258;270" dur="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Sparkle effects -->
  <g>
    <circle cx="180" cy="120" r="2" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="180" r="2" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="400" cy="350" r="2" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="120" cy="380" r="2" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  
  <!-- Ring decoration -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#orbitGradient1)" stroke-width="1" opacity="0.3" stroke-dasharray="10,5">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="60s" repeatCount="indefinite"/>
  </circle>
</svg>
