<svg xmlns="http://www.w3.org/2000/svg" width="120" height="40" viewBox="0 0 120 40">
  <defs>
    <linearGradient id="atomic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff;#7c3aed;#f472b6;#00d4ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#f472b6;#00d4ff;#7c3aed" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#00d4ff;#7c3aed;#f472b6" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .nucleus { animation: pulse 2s ease-in-out infinite; transform-origin: 20px 20px; }
    .orbit1 { animation: orbit 3s linear infinite; transform-origin: 20px 20px; }
    .orbit2 { animation: orbit-rev 4s linear infinite; transform-origin: 20px 20px; }
    .orbit3 { animation: orbit 5s linear infinite; transform-origin: 20px 20px; }
    @keyframes pulse { 0%, 100% { r: 6; } 50% { r: 7; } }
    @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes orbit-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  </style>
  <g filter="url(#glow)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="url(#atomic-grad)" stroke-width="2.5"/>
    <g class="orbit1"><circle cx="20" cy="20" r="15" fill="none" stroke="url(#atomic-grad)" stroke-width="1" stroke-dasharray="2 4"/></g>
    <g class="orbit2"><circle cx="20" cy="20" r="15" fill="none" stroke="url(#atomic-grad)" stroke-width="1" stroke-dasharray="3 5" transform="rotate(60 20 20)"/></g>
    <g class="orbit3"><circle cx="20" cy="20" r="15" fill="none" stroke="url(#atomic-grad)" stroke-width="1" stroke-dasharray="4 3" transform="rotate(120 20 20)"/></g>
    <circle class="nucleus" cx="20" cy="20" r="6" fill="url(#atomic-grad)"/>
  </g>
  <text x="50" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#atomic-grad)">Atomic Search</text>
</svg>
