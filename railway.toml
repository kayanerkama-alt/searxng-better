[railway]
  variableGroup = "atomic-search"

[atomic-search]
  dockerfile = "Dockerfile"

[atomic-search.variables]
  NAME = "Atomic Search"
  GRANIAN_HOST = "0.0.0.0"
  GRANIAN_PORT = "8080"
  SIMPLE_STYLE = "macchiato"
  SAFE_SEARCH = "1"
  AUTOCOMPLETE = "google"
  HTTP_PROTOCOL_VERSION = "1.1"
  IMAGE_PROXY = "true"

[atomic-search.health]
  port = 8080
  path = "/healthz"
