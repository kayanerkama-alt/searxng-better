version: '3.8'
services:
  atomic-search:
    build: .
    container_name: atomic-search
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NAME=Atomic Search
      - IMAGE_PROXY=true
      - GRANIAN_HOST=0.0.0.0
      - GRANIAN_PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - atomic-data:/app/searx/data

volumes:
  atomic-data:
