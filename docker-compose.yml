# Atomic Search - Docker Compose
version: '3.8'

services:
  atomic-search:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET_KEY=dev-secret-key-change-in-production
      - SEARXNG_DATA_DIR=/app/searxng/data
    volumes:
      - ./searxng-data:/app/searxng/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
