# Render.com Blueprint for Atomic Search
# Deploy to: https://render.com

services:
  - type: web
    name: atomic-search
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: NAME
        value: "Atomic Search"
      - key: SIMPLE_STYLE
        value: "macchiato"
      - key: SAFE_SEARCH
        value: "1"
      - key: AUTOCOMPLETE
        value: "google"
      - key: HTTP_PROTOCOL_VERSION
        value: "1.1"
      - key: IMAGE_PROXY
        value: "true"
      - key: GRANIAN_HOST
        value: "0.0.0.0"
      - key: GRANIAN_PORT
        value: "8080"
      - key: SECRET_KEY
        generateValue: true
