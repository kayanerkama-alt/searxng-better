<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Orbit rings -->
  <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.9" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.9" transform="rotate(-60 16 16)"/>
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="5" fill="url(#grad)"/>
  <!-- Electrons -->
  <circle cx="30" cy="16" r="2" fill="#6366f1"/>
  <circle cx="16" cy="16" r="2" fill="#8b5cf6" transform="rotate(60 16 16) translate(14 0)"/>
  <circle cx="16" cy="16" r="2" fill="#06b6d4" transform="rotate(-60 16 16) translate(14 0)"/>
</svg>
