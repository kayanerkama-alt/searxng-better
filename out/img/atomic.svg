<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="atomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="orbitGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#22d3d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="#0f172a" rx="20"/>
  
  <!-- Nucleus -->
  <circle cx="100" cy="100" r="18" fill="url(#atomGrad)" filter="url(#glow)">
    <animate attributeName="r" values="18;20;18;17;18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1;0.9;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Orbit 1 -->
  <ellipse cx="100" cy="100" rx="65" ry="25" fill="none" stroke="url(#orbitGrad1)" stroke-width="2" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Orbit 2 -->
  <ellipse cx="100" cy="100" rx="65" ry="25" fill="none" stroke="url(#orbitGrad2)" stroke-width="2" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="60 100 100" to="420 100 100" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Orbit 3 -->
  <ellipse cx="100" cy="100" rx="65" ry="25" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Electron 1 -->
  <circle r="6" fill="#f472b6" filter="url(#softGlow)">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#orbit1"/>
    </animateMotion>
  </circle>
  
  <!-- Electron 2 -->
  <circle r="5" fill="#34d399" filter="url(#softGlow)">
    <animateMotion dur="5s" repeatCount="indefinite">
      <mpath href="#orbit2"/>
    </animateMotion>
  </circle>
  
  <!-- Electron 3 -->
  <circle r="5" fill="#fbbf24" filter="url(#softGlow)">
    <animateMotion dur="6s" repeatCount="indefinite">
      <mpath href="#orbit3"/>
    </animateMotion>
  </circle>
  
  <!-- Hidden orbit paths -->
  <ellipse id="orbit1" cx="100" cy="100" rx="65" ry="25" fill="none" stroke="none">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse id="orbit2" cx="100" cy="100" rx="65" ry="25" fill="none" stroke="none">
    <animateTransform attributeName="transform" type="rotate" from="60 100 100" to="420 100 100" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse id="orbit3" cx="100" cy="100" rx="65" ry="25" fill="none" stroke="none">
    <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Sparkles -->
  <circle cx="30" cy="40" r="2" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="60" r="1.5" fill="#f472b6" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="45" cy="160" r="2" fill="#34d399" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="160" cy="150" r="1.5" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>
