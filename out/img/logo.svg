<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="40%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#0044aa"/>
    </radialGradient>
    <linearGradient id="orbit1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffd93d"/>
    </linearGradient>
    <linearGradient id="orbit2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6bcb77"/>
      <stop offset="100%" stop-color="#4d96ff"/>
    </linearGradient>
    <linearGradient id="orbit3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nucleus-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Animated background -->
  <rect width="400" height="400" fill="#0a0a1a">
    <animate attributeName="fill" values="#0a0a1a;#0f0f2a;#0a0a1a" dur="8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Outer glow rings -->
  <circle cx="200" cy="180" r="130" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="120;140;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="180" r="150" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.15">
    <animate attributeName="r" values="140;160;140" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Orbiting ellipses -->
  <ellipse cx="200" cy="180" rx="100" ry="35" fill="none" stroke="url(#orbit1)" stroke-width="3" opacity="0.9" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 200 180" to="360 200 180" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="180" rx="100" ry="35" fill="none" stroke="url(#orbit2)" stroke-width="3" opacity="0.9" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="60 200 180" to="420 200 180" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="180" rx="100" ry="35" fill="none" stroke="url(#orbit3)" stroke-width="3" opacity="0.9" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="120 200 180" to="480 200 180" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Electron dots on orbits -->
  <circle r="8" fill="#ffd93d" filter="url(#glow)">
    <animateMotion dur="5s" repeatCount="indefinite">
      <mpath href="#path1"/>
    </animateMotion>
  </circle>
  <circle r="6" fill="#4d96ff" filter="url(#glow)">
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#path2"/>
    </animateMotion>
  </circle>
  <circle r="7" fill="#c77dff" filter="url(#glow)">
    <animateMotion dur="9s" repeatCount="indefinite">
      <mpath href="#path3"/>
    </animateMotion>
  </circle>
  
  <!-- Orbit paths -->
  <path id="path1" d="M100,180 A100,35 0 0,1 300,180 A100,35 0 0,1 100,180" fill="none"/>
  <path id="path2" d="M100,180 A100,35 0 0,1 300,180 A100,35 0 0,1 100,180" fill="none"/>
  <path id="path3" d="M100,180 A100,35 0 0,1 300,180 A100,35 0 0,1 100,180" fill="none"/>
  
  <!-- Nucleus core -->
  <circle cx="200" cy="180" r="45" fill="url(#nucleus)" filter="url(#nucleus-glow)">
    <animate attributeName="r" values="42;48;42" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Nucleus inner rings -->
  <circle cx="200" cy="180" r="32" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.7">
    <animate attributeName="r" values="28;36;28" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="180" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="16;24;16" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Search magnifying glass overlay -->
  <g transform="translate(200, 180)" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <circle cx="-8" cy="-8" r="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </g>
  
  <!-- Pulsing energy rings -->
  <circle cx="200" cy="180" r="50" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.4">
    <animate attributeName="r" values="50;90;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="180" r="50" fill="none" stroke="#0088ff" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="50;80;50" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title text with glow -->
  <text x="200" y="350" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="4" filter="url(#glow)">
    ATOMIC SEARCH
  </text>
  <text x="200" y="350" text-anchor="middle" fill="#00ffff" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="4" opacity="0.5">
    ATOMIC SEARCH
  </text>
</svg>
