<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the atom rings -->
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Intense glow for nucleus -->
    <filter id="nucleusGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background circle (optional, can be removed) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ringGradient)" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Orbit paths -->
  <g fill="none" stroke="url(#ringGradient)" stroke-width="2" opacity="0.8">
    <!-- Horizontal orbit -->
    <ellipse cx="100" cy="100" rx="70" ry="25" transform="rotate(0 100 100)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Tilted orbit 1 -->
    <ellipse cx="100" cy="100" rx="70" ry="25" transform="rotate(60 100 100)">
      <animateTransform attributeName="transform" type="rotate" from="60 100 100" to="420 100 100" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Tilted orbit 2 -->
    <ellipse cx="100" cy="100" rx="70" ry="25" transform="rotate(-60 100 100)">
      <animateTransform attributeName="transform" type="rotate" from="-60 100 100" to="300 100 100" dur="12s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Orbiting electrons -->
  <g filter="url(#glow)">
    <!-- Electron 1 -->
    <circle r="5" fill="#6366f1">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#orbit1"/>
      </animateMotion>
    </circle>
    
    <!-- Electron 2 -->
    <circle r="4" fill="#8b5cf6">
      <animateMotion dur="5s" repeatCount="indefinite">
        <mpath href="#orbit2"/>
      </animateMotion>
    </circle>
    
    <!-- Electron 3 -->
    <circle r="4" fill="#06b6d4">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbit3"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- Orbit path definitions for mpath -->
  <defs>
    <path id="orbit1" d="M 170 100 A 70 25 0 1 1 30 100 A 70 25 0 1 1 170 100"/>
    <path id="orbit2" d="M 170 100 A 70 25 0 1 1 30 100 A 70 25 0 1 1 170 100" transform="rotate(60 100 100)"/>
    <path id="orbit3" d="M 170 100 A 70 25 0 1 1 30 100 A 70 25 0 1 1 170 100" transform="rotate(-60 100 100)"/>
  </defs>
  
  <!-- Nucleus (protons/neutrons cluster) -->
  <g filter="url(#nucleusGlow)">
    <!-- Pulsing animation for nucleus -->
    <circle cx="100" cy="100" r="18" fill="#6366f1">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="95" r="6" fill="#8b5cf6"/>
    <circle cx="105" cy="95" r="5" fill="#a78bfa"/>
    <circle cx="100" cy="103" r="5" fill="#06b6d4"/>
  </g>
  
  <!-- Additional floating electrons with different paths -->
  <g filter="url(#glow)">
    <circle r="3" fill="#f472b6">
      <animate attributeName="cx" values="30;170;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100;100" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#34d399">
      <animate attributeName="cx" values="170;30;170" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100;100" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
