<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0f172a" rx="40"/>
  <circle cx="200" cy="200" r="50" fill="url(#g1)" filter="url(#glow)">
    <animate attributeName="r" values="50;55;50;45;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="200" cy="200" rx="120" ry="40" fill="none" stroke="url(#g2)" stroke-width="4" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="200" rx="120" ry="40" fill="none" stroke="#34d399" stroke-width="3" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="60 200 200" to="420 200 200" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="200" rx="120" ry="40" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="120 200 200" to="480 200 200" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <text x="200" y="360" text-anchor="middle" fill="#fff" font-family="Arial" font-size="32" font-weight="bold">ATOMIC SEARCH</text>
</svg>
